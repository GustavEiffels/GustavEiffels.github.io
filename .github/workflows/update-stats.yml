name: Update GA Stats

on:
  schedule:
    - cron: '0 * * * *'  # 매 1시간마다
  workflow_dispatch:      # 수동 실행 가능

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-analytics-data

      - name: Fetch GA4 stats
        env:
          GA_SERVICE_ACCOUNT: ${{ secrets.GA_SERVICE_ACCOUNT }}
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
        run: python fetch_stats.py

      - name: Commit stats.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git diff --staged --quiet || git commit -m "chore: update ga stats"
          git push
