<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gustav Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Common Sidebar -->
    <aside class="sidebar">
        <h2>📊 GUSTAV LAB</h2>
        <nav>
            <ul>
                <li><a onclick="loadContent('home')" data-page="home" class="active">🏠 홈 / 소개</a></li>
                <li><a onclick="loadContent('stocks')" data-page="stocks">📈 해외 주식</a></li>
                <li><a onclick="loadContent('dev')" data-page="dev">💻 개발 일지</a></li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main id="content-target" class="main-content">
        <!-- 초기 콘텐츠 로드 -->
        <h1>Welcome to My Lab</h1>
        <div class="card">
            <h2>안녕하세요, Gustav입니다.</h2>
            <p>이곳은 저의 투자 분석과 기술적 연구를 기록하는 개인 실험실입니다.</p>
        </div>
    </main>

    <script>
        async function loadContent(page) {
            const target = document.getElementById('content-target');
            target.style.opacity = 0;
            
            try {
                const path = `content/${page}.html`;
                const response = await fetch(path);
                
                if (response.ok) {
                    const html = await response.text();
                    setTimeout(() => {
                        target.innerHTML = html;
                        target.style.opacity = 1;
                        updateActiveLink(page);
                    }, 200);
                } else {
                    throw new Error('Page not found');
                }
            } catch (err) {
                target.innerHTML = "<h1>Error</h1><div class='card'><p>콘텐츠를 불러오는 중 오류가 발생했습니다.</p></div>";
                target.style.opacity = 1;
            }
        }

        function updateActiveLink(page) {
            document.querySelectorAll('.sidebar a').forEach(a => {
                if (a.getAttribute('data-page') === page) {
                    a.classList.add('active');
                } else {
                    a.classList.remove('active');
                }
            });
        }

        // 브라우저 뒤로가기 대응을 위한 간단한 처리 (선택 사항)
        window.onpopstate = function(event) {
            if (event.state && event.state.page) {
                loadContent(event.state.page);
            }
        };
    </script>
</body>
</html>
