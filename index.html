<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gustav Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Common Sidebar (Module) -->
    <aside class="sidebar">
        <h2>📊 GUSTAV LAB</h2>
        <nav>
            <ul>
                <li><a onclick="loadContent('home')">🏠 홈 / 소개</a></li>
                <li><a onclick="loadContent('stocks')">📈 해외 주식</a></li>
                <li><a onclick="loadContent('dev')">💻 개발 일지</a></li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content Area (Partial Rendering Target) -->
    <main id="content-target" class="main-content">
        <!-- 초기 홈 화면 콘텐츠 -->
        <h1>Welcome to My Lab</h1>
        <div class="card">
            <h2>안녕하세요, Gustav입니다.</h2>
            <p>이곳은 저의 투자 분석과 기술적 연구를 기록하는 개인 실험실입니다.</p>
        </div>
    </main>

    <script>
        // 부분 렌더링 엔진 (Fragment Loader)
        async function loadContent(page) {
            const target = document.getElementById('content-target');
            target.style.opacity = 0; // 페이드 아웃 효과
            
            try {
                // 페이지별 HTML 조각 파일 경로 설정
                const path = `content/${page}.html`;
                const response = await fetch(path);
                
                if (response.ok) {
                    const html = await response.text();
                    setTimeout(() => {
                        target.innerHTML = html;
                        target.style.opacity = 1;
                        // 활성화 탭 표시 업데이트
                        updateActiveLink(page);
                    }, 300);
                } else {
                    throw new Error('Page not found');
                }
            } catch (err) {
                target.innerHTML = "<h1>Error</h1><div class='card'><p>콘텐츠를 불러오는 중 오류가 발생했습니다.</p></div>";
                target.style.opacity = 1;
            }
        }

        function updateActiveLink(page) {
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            // 단순 구현을 위해 인덱스 등으로 매칭 (실제로는 data-page 속성 추천)
        }
    </script>
</body>
</html>
