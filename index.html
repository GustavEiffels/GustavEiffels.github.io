<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gustav Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <aside class="sidebar">
        <h2>📊 GUSTAV LAB</h2>
        <nav>
            <ul>
                <li><a onclick="location.reload()" style="cursor:pointer;">🏠 홈 / 소개</a></li>
                <li><a onclick="loadCategory(''stocks'')" style="cursor:pointer;">📈 해외 주식</a></li>
                <li><a onclick="loadCategory(''dev'')" style="cursor:pointer;">💻 개발 일지</a></li>
            </ul>
        </nav>
    </aside>

    <main id="content-target" class="main-content">
        <h1>Welcome to My Lab</h1>
        <div class="card">
            <h2>안녕하세요, Gustav입니다.</h2>
            <p>이곳은 저의 투자 분석과 기술적 연구를 기록하는 개인 실험실입니다.</p>
        </div>
    </main>

    <script>
        async function loadCategory(category) {
            const target = document.getElementById(''content-target'');
            target.style.opacity = 0;
            
            try {
                const response = await fetch(''assets/data/reports.json'');
                const reports = await response.json();
                const filtered = reports.filter(r => r.category === category);
                
                let html = `<h1>${category.toUpperCase()}</h1>`;
                filtered.forEach(r => {
                    html += `
                        <div class="card" onclick="loadReport(''${r.path}'')" style="cursor:pointer;">
                            <h3>${r.title}</h3>
                            <p style="font-size:0.85rem; color:var(--text-muted);">${r.date}</p>
                        </div>
                    `;
                });
                
                setTimeout(() => {
                    target.innerHTML = html || "<h1>Coming Soon</h1><p>콘텐츠를 준비 중입니다.</p>";
                    target.style.opacity = 1;
                }, 300);
            } catch (err) {
                console.error(err);
            }
        }

        async function loadReport(path) {
            const target = document.getElementById(''content-target'');
            target.style.opacity = 0;
            const response = await fetch(path);
            const html = await response.text();
            setTimeout(() => {
                target.innerHTML = html;
                target.style.opacity = 1;
                window.scrollTo(0,0);
            }, 300);
        }
    </script>
</body>
</html>
