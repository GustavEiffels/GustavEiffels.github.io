<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="google-site-verification"
      content="nIcUuPfbZxcZDe0niRet3wV_M4gKzuZHz1O8yx--_OQ"
    />
    <title>Singsiuk Lab</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <meta
      name="naver-site-verification"
      content="cbb2dd6b175e7f24b794c957432ddc3942822995"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <!-- Common Sidebar -->
    <aside class="sidebar">
      <h2>📊 Singsiuk LAB</h2>
      <nav>
        <ul>
          <li>
            <a onclick="loadContent('home')" data-page="home" class="active"
              >🏠 Home / Introduction</a
            >
          </li>
          <li>
            <a onclick="loadContent('stocks')" data-page="stocks"
              >📈 Overseas Stocks</a
            >
          </li>
          <li>
            <a onclick="loadContent('dev')" data-page="dev"
              >💻 Development Log</a
            >
          </li>
        </ul>
      </nav>
      <div class="visitor-counter" id="visitor-counter"></div>
    </aside>

    <!-- Main Content Area -->
    <main id="content-target" class="main-content">
      <!-- 초기 콘텐츠 로드 -->
      <h1>Welcome to My Lab</h1>
      <div class="card">
        <h2>Hello, I'm Singsiuk.</h2>
        <p>
          This is my personal laboratory for recording investment analysis and
          technical research.
        </p>
      </div>
    </main>

    <script>
      async function loadContent(page) {
        const target = document.getElementById("content-target");
        target.style.opacity = 0;

        try {
          const path = `content/${page}.html`;
          const response = await fetch(path);

          if (response.ok) {
            const html = await response.text();
            setTimeout(() => {
              target.innerHTML = html;
              target.style.opacity = 1;
              updateActiveLink(page);
            }, 200);
          } else {
            throw new Error("Page not found");
          }
        } catch (err) {
          target.innerHTML =
            "<h1>Error</h1><div class='card'><p>콘텐츠를 불러오는 중 오류가 발생했습니다.</p></div>";
          target.style.opacity = 1;
        }
      }

      function updateActiveLink(page) {
        document.querySelectorAll(".sidebar a").forEach((a) => {
          if (a.getAttribute("data-page") === page) {
            a.classList.add("active");
          } else {
            a.classList.remove("active");
          }
        });
      }

      window.onpopstate = function (event) {
        if (event.state && event.state.page) {
          loadContent(event.state.page);
        }
      };

      // Visitor counter from stats.json
      (function () {
        const isOwner = localStorage.getItem("site_owner") === "true";
        const counter = document.getElementById("visitor-counter");
        const eyeIcon = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;

        if (isOwner) {
          counter.innerHTML = `
            <div class="visitor-card">
              <div class="visitor-card-header">${eyeIcon} ANALYTICS</div>
              <div class="visitor-card-row">
                <span class="visitor-card-label">owner mode</span>
              </div>
            </div>`;
          return;
        }

        fetch("/stats.json?t=" + Date.now())
          .then((r) => r.json())
          .then((d) => {
            counter.innerHTML = `
              <div class="visitor-card">
                <div class="visitor-card-header">${eyeIcon} ANALYTICS</div>
                <div class="visitor-card-row">
                  <span class="visitor-card-label">visitors</span>
                  <span class="visitor-card-value">${d.visitors.toLocaleString()}</span>
                </div>
                <div class="visitor-card-row">
                  <span class="visitor-card-label">pageviews</span>
                  <span class="visitor-card-value">${d.pageviews.toLocaleString()}</span>
                </div>
              </div>`;
          })
          .catch(() => {});
      })();
    </script>

    <!-- Google Analytics -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-D7VTDS9VNN"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-D7VTDS9VNN");
    </script>
  </body>
</html>
