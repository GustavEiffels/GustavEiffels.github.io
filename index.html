<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Singsiuk Lab</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <!-- Common Sidebar -->
    <aside class="sidebar">
      <h2>📊 Singsiuk LAB</h2>
      <nav>
        <ul>
          <li>
            <a onclick="loadContent('home')" data-page="home" class="active"
              >🏠 Home / Introduction</a
            >
          </li>
          <li>
            <a onclick="loadContent('stocks')" data-page="stocks"
              >📈 Overseas Stocks</a
            >
          </li>
          <li>
            <a onclick="loadContent('dev')" data-page="dev"
              >💻 Development Log</a
            >
          </li>
        </ul>
      </nav>
      <div class="visitor-counter" id="visitor-counter"></div>
    </aside>

    <!-- Main Content Area -->
    <main id="content-target" class="main-content">
      <!-- 초기 콘텐츠 로드 -->
      <h1>Welcome to My Lab</h1>
      <div class="card">
        <h2>Hello, I'm Singsiuk.</h2>
        <p>
          This is my personal laboratory for recording investment analysis and
          technical research.
        </p>
      </div>
    </main>

    <script>
      async function loadContent(page) {
        const target = document.getElementById("content-target");
        target.style.opacity = 0;

        try {
          const path = `content/${page}.html`;
          const response = await fetch(path);

          if (response.ok) {
            const html = await response.text();
            setTimeout(() => {
              target.innerHTML = html;
              target.style.opacity = 1;
              updateActiveLink(page);
            }, 200);
          } else {
            throw new Error("Page not found");
          }
        } catch (err) {
          target.innerHTML =
            "<h1>Error</h1><div class='card'><p>콘텐츠를 불러오는 중 오류가 발생했습니다.</p></div>";
          target.style.opacity = 1;
        }
      }

      function updateActiveLink(page) {
        document.querySelectorAll(".sidebar a").forEach((a) => {
          if (a.getAttribute("data-page") === page) {
            a.classList.add("active");
          } else {
            a.classList.remove("active");
          }
        });
      }

      window.onpopstate = function (event) {
        if (event.state && event.state.page) {
          loadContent(event.state.page);
        }
      };

      // Visitor counter - owner exclusion
      (function () {
        const params = new URLSearchParams(window.location.search);
        if (params.has("set-owner")) {
          localStorage.setItem("site_owner", "true");
        }

        const counter = document.getElementById("visitor-counter");
        const isOwner = localStorage.getItem("site_owner") === "true";

        if (isOwner) {
          counter.innerHTML = `
            <span class="visitor-label">VISITORS</span>
            <div class="visitor-badge-box visitor-owner">
              <span>👁 owner mode</span>
            </div>`;
        } else {
          counter.innerHTML = `
            <span class="visitor-label">VISITORS</span>
            <div class="visitor-badge-box">
              <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2FgustavEiffels.github.io&count_bg=%235e81f4&title_bg=%2321253a&title=visitors&edge_flat=true" alt="visitor count" />
            </div>`;
        }
      })();
    </script>

    <!-- Google Analytics -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-D7VTDS9VNN"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-D7VTDS9VNN");
    </script>
  </body>
</html>
